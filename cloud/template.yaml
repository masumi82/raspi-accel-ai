AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: raspi-accel-ai cloud backend (IoT -> Bedrock -> DynamoDB)

Parameters:
  BedrockModelId:
    Type: String
    Default: jp.anthropic.claude-haiku-4-5-20251001-v1:0
    Description: Bedrock inference-profile id for Claude Haiku 4.5 (Japan-local jp. profile, low-cost; verified in ap-northeast-1). Switch to a Sonnet jp. profile for higher accuracy.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256

Resources:
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: deviceId
          AttributeType: S
        - AttributeName: ts
          AttributeType: S
      KeySchema:
        - AttributeName: deviceId
          KeyType: HASH
        - AttributeName: ts
          KeyType: RANGE

  AnalyzerDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600

  AnalyzerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: analyzer.handler.handler
      Environment:
        Variables:
          EVENTS_TABLE: !Ref EventsTable
          BEDROCK_MODEL_ID: !Ref BedrockModelId
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt AnalyzerDLQ.Arn
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt AnalyzerDLQ.QueueName
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Events:
        AccelEvent:
          Type: IoTRule
          Properties:
            Sql: "SELECT * FROM 'devices/+/events'"

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: raspi-accel-ai-users
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireUppercase: true
          RequireSymbols: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - http://localhost:5173/
        - !Sub "https://${FrontendDistribution.DomainName}/"
      LogoutURLs:
        - http://localhost:5173/
        - !Sub "https://${FrontendDistribution.DomainName}/"

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "raspi-accel-ai-${AWS::AccountId}"
      UserPoolId: !Ref UserPool

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "raspi-accel-ai-oac-${AWS::AccountId}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: s3origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref FrontendOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: s3origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  DashboardApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - http://localhost:5173
          - !Sub "https://${FrontendDistribution.DomainName}"
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - authorization
          - content-type
      Auth:
        Authorizers:
          CognitoJwt:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient
        DefaultAuthorizer: CognitoJwt

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: api.handler.handler
      Environment:
        Variables:
          EVENTS_TABLE: !Ref EventsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventsTable
      Events:
        ListEvents:
          Type: HttpApi
          Properties:
            ApiId: !Ref DashboardApi
            Method: GET
            Path: /events

Outputs:
  EventsTableName:
    Value: !Ref EventsTable
  AnalyzerFunctionName:
    Value: !Ref AnalyzerFunction
  AnalyzerDLQUrl:
    Value: !Ref AnalyzerDLQ
  DashboardApiUrl:
    Value: !Sub "https://${DashboardApi}.execute-api.${AWS::Region}.amazonaws.com"
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  HostedUiDomain:
    Value: !Sub "raspi-accel-ai-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com"
  FrontendBucketName:
    Value: !Ref FrontendBucket
  FrontendUrl:
    Value: !Sub "https://${FrontendDistribution.DomainName}"
